# Ruff configuration for flexberry-markitdown-mcp
# https://docs.astral.sh/ruff/configuration/

line-length = 100
target-version = "py310"

[lint]
select = ["E", "F", "W", "C", "I"]
ignore = ["E501", "C901"]

[lint.isort]
lines-after-imports = 2

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
